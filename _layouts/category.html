---
layout: default
---
{% assign cat_slug = page.cat_slug %}
{% assign cat_posts = site.posts | where: "category", cat_slug %}

<div class="cat-{{ cat_slug }}">
  <div class="category-hero">
    <h1>{{ page.title }}</h1>
    <p>{{ page.description }}</p>
  </div>

  <div class="card-list">
    {% for post in cat_posts %}
      {% include card.html post=post %}
    {% else %}
      <p style="color:#999; padding: 40px 0;">아직 글이 없습니다.</p>
    {% endfor %}
  </div>
</div>

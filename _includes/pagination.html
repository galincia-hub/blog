{% if paginator.total_pages > 1 %}
<nav class="pagination">
  {% if paginator.previous_page %}
    <a class="prev-next" href="{{ paginator.previous_page_path }}">← 이전</a>
  {% endif %}

  {% for i in (1..paginator.total_pages) %}
    {% if i == paginator.page %}
      <span class="current">{{ i }}</span>
    {% elsif i == 1 %}
      <a href="/">{{ i }}</a>
    {% else %}
      <a href="/page{{ i }}/">{{ i }}</a>
    {% endif %}
  {% endfor %}

  {% if paginator.next_page %}
    <a class="prev-next" href="{{ paginator.next_page_path }}">다음 →</a>
  {% endif %}
</nav>
{% endif %}

{% assign schema_type = page.schema_type | default: 'article' %}

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ page.title | jsonify }},
  "description": {{ page.description | default: site.description | jsonify }},
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.last_updated | default: page.date | date_to_xmlschema }}",
  "author": { "@type": "Organization", "name": "모아가이드" },
  "publisher": { "@type": "Organization", "name": "모아가이드", "url": "{{ site.url }}/" }
  {% if page.thumbnail %},"image": "{{ site.url }}{{ page.thumbnail }}"{% endif %}
}
</script>

{% if page.faq %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {% for item in page.faq %}
    {
      "@type": "Question",
      "name": {{ item.q | jsonify }},
      "acceptedAnswer": { "@type": "Answer", "text": {{ item.a | jsonify }} }
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>
{% endif %}

{% if schema_type == 'software_faq' or schema_type == 'software' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": {{ page.title | jsonify }},
  "description": {{ page.description | default: site.description | jsonify }},
  "applicationCategory": "UtilitiesApplication",
  "operatingSystem": "Windows",
  "offers": { "@type": "Offer", "price": "0", "priceCurrency": "KRW" }
}
</script>
{% endif %}

{% if schema_type == 'howto_faq' or schema_type == 'howto' %}
{% if page.howto_steps %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "HowTo",
  "name": {{ page.title | jsonify }},
  "description": {{ page.description | default: site.description | jsonify }},
  "step": [
    {% for step in page.howto_steps %}
    {
      "@type": "HowToStep",
      "name": {{ step.name | jsonify }},
      "text": {{ step.text | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>
{% endif %}
{% endif %}
